<h2>Upload App</h2>

<input id="name" placeholder="App Name">
<input id="icon" placeholder="Icon URL">
<input id="version" placeholder="Version">
<input id="size" placeholder="Size">
<input id="rating" placeholder="Rating">
<input id="category" placeholder="Category">

<input id="publisher" placeholder="Publisher">
<input id="requirements" placeholder="Android version">

<input id="telegram" placeholder="Telegram link">
<input id="download" placeholder="Download link">

<textarea id="desc" placeholder="Short description"></textarea>
<textarea id="longdesc" placeholder="Full description"></textarea>

<textarea id="screens" placeholder="Screenshot URLs comma separated"></textarea>

<button onclick="upload()">Publish</button>

<script>

const API="https://pro-premium-apk-01-project-hosting-1.onrender.com/api/apps"

async function upload(){

const data={
name:name.value,
icon:icon.value,
version:version.value,
size:size.value,
rating:rating.value,
category:category.value,
publisher:publisher.value,
requirements:requirements.value,
description:desc.value,
longdesc:longdesc.value,
telegram:telegram.value,
download:download.value,
screenshots:screens.value.split(",").map(s=>s.trim())
}

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("App uploaded")

}

</script>
