<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Admin Panel</h1>

<input id="name" placeholder="App Name">

<input id="icon" placeholder="Icon URL">

<input id="version" placeholder="Version">

<input id="size" placeholder="Size">

<textarea id="desc" placeholder="Description"></textarea>

<input id="download" placeholder="DevUploads Link">

<button onclick="upload()">Publish App</button>

<script>

const API="https://YOUR_RENDER_URL/api/apps"

async function upload(){

const data={
name:name.value,
icon:icon.value,
version:version.value,
size:size.value,
description:desc.value,
download:download.value
}

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

alert("App Uploaded")

}

</script>

</body>
</html>
